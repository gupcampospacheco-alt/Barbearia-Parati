<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda do Barbeiro | Barbearia Parati</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="assets/img/icon-192.png" />
  <link rel="stylesheet" href="assets/css/dashboard.css" />
</head>
<body>
  <aside class="sidebar">
    <h2>Barbearia Parati</h2>
    <nav>
      <a href="#listaAgendamentos">Minha agenda</a>
      <a href="personalizar-horarios.html" target="_blank" rel="noopener">Personalizar horários</a>
      <a href="index.html">Site principal</a>
      <a href="#" id="btnSair">Sair</a>
    </nav>
  </aside>

  <main class="conteudo">
    <div class="topo-painel">
      <div>
        <h1>Minha Agenda</h1>
        <p id="barbeiroLogado">Carregando barbeiro...</p>
      </div>

      <a href="personalizar-horarios.html" target="_blank" rel="noopener" class="btn-limpar botao-link">
        Personalizar horários
      </a>
    </div>

    <section class="filtros-topo" aria-label="Filtros da agenda">
      <div class="filtro-box">
        <label for="filtroData">Filtrar por dia</label>
        <input type="date" id="filtroData" class="filtro" />
      </div>

      <div class="filtro-box">
        <label for="filtroStatus">Filtrar por status</label>
        <select id="filtroStatus" class="filtro">
          <option value="todos">Todos</option>
          <option value="pendente">Pendentes</option>
          <option value="confirmado">Confirmados</option>
          <option value="atendido">Atendidos</option>
          <option value="cancelado">Cancelados</option>
        </select>
      </div>

      <div class="filtro-box">
        <label>&nbsp;</label>
        <button id="btnLimparFiltro" class="btn-limpar">Limpar data</button>
      </div>
    </section>

    <section class="resumo-grid">
      <div class="resumo-card"><span>Total visível</span><strong id="resumoHoje">0</strong></div>
      <div class="resumo-card"><span>Pendentes</span><strong id="resumoPendentes">0</strong></div>
      <div class="resumo-card"><span>Confirmados/atendidos</span><strong id="resumoAtendidos">0</strong></div>
      <div class="resumo-card"><span>Cancelados</span><strong id="resumoCancelados">0</strong></div>
    </section>

    <div id="listaAgendamentos" class="lista-agendamentos">
      <p class="vazio">Carregando agendamentos...</p>
    </div>
  </main>

  <script type="module" src="assets/js/painel-barbeiro.js"></script>
</body>
</html>
